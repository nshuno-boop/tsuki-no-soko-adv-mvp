name: Static check

on:
  push:
  pull_request:

jobs:
  static-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pillow

      - name: Generate placeholder assets
        run: python tools/generate_placeholder_assets.py

      - name: Check project integrity
        run: python tools/check_project_integrity.py

      - name: Compile tools
        run: python -m py_compile tools/generate_placeholder_assets.py tools/check_project_integrity.py

